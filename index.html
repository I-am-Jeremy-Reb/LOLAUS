<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Optics & Image Analysis Toolkit</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- TIFF SUPPORT -->
<script src="https://unpkg.com/utif@3.1.0/UTIF.min.js"></script>

<style>
body {
    font-family: "Segoe UI", Tahoma, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

nav {
    background: #1f2937;
    padding: 12px;
    text-align: center;
}

nav button {
    margin: 5px;
    padding: 10px 18px;
    border: none;
    background: #374151;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    margin-bottom: 25px;
}

.tab { display: none; }
.active { display: block; }

input {
    margin: 5px;
    padding: 8px;
}

button.calc {
    margin-top: 10px;
    padding: 10px 15px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
}

canvas {
    margin-top: 15px;
    max-width: 100%;
}
</style>
</head>

<body>

<nav>
    <button onclick="showTab('home')">Home</button>
    <button onclick="showTab('strehl')">Strehl Tool</button>
</nav>

<div class="container">

<!-- HOME -->
<div id="home" class="tab active">
    <div class="card">
        <h1>Optics Toolkit</h1>

        <div style="display:flex;justify-content:center;gap:40px;">
            <img src="zeus_logo.png" height="80">
            <img src="nsf_logo.png" height="80">
        </div>

        <p>Laser diagnostics toolkit. Contributions welcome.</p>

        <p>
        Developer:
        <a href="https://sites.google.com/view/jeremy-rebenstock/about" target="_blank">
        Jeremy Rebenstock
        </a>
        </p>
    </div>
</div>

<!-- STREHL TOOL -->
<div id="strehl" class="tab">
    <div class="card">
        <h2>Encircled Energy & Strehl</h2>

        \[
        E(r) = \int_0^r I(r') 2\pi r' dr'
        \]

        <input type="file" id="upload"><br>

        <input id="um_per_pixel" placeholder="µm per pixel (optional)">
        <input id="r_dl" placeholder="Diffraction limit (µm, optional)"><br>

        <button class="calc" onclick="plotCircle()">Plot 80% Radius</button>

        <canvas id="canvas"></canvas>

        <div id="result"></div>
    </div>
</div>

</div>

<script>
let currentImageData = null;
let r80_global = null;

// TAB SWITCH
function showTab(tabId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
}

// HANDLE FILE UPLOAD
document.getElementById('upload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(ev) {

        // TIFF handling
        if (file.name.toLowerCase().includes(".tif")) {

            let ifds = UTIF.decode(ev.target.result);
            UTIF.decodeImage(ev.target.result, ifds[0]);

            let rgba = UTIF.toRGBA8(ifds[0]);
            let width = ifds[0].width;
            let height = ifds[0].height;

            processImage(rgba, width, height);
        }
        else {
            // fallback for png/jpg
            let img = new Image();
            img.onload = function() {
                let canvas = document.getElementById('canvas');
                let ctx = canvas.getContext('2d');

                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img,0,0);

                let data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
                processImage(data, canvas.width, canvas.height);
            };
            img.src = ev.target.result;
        }
    };

    reader.readAsArrayBuffer(file);
});

// CORE PROCESSING
function processImage(data, width, height) {

    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');

    canvas.width = width;
    canvas.height = height;

    let imageData = ctx.createImageData(width, height);
    imageData.data.set(data);
    ctx.putImageData(imageData,0,0);

    let intensity = new Array(width*height);
    let total = 0;

    for (let i=0; i<data.length; i+=4) {
        let idx = i/4;
        let I = data[i]; // grayscale assumption for TIFF
        intensity[idx] = I;
        total += I;
    }

    // centroid
    let xSum=0, ySum=0;
    for (let y=0; y<height; y++) {
        for (let x=0; x<width; x++) {
            let I = intensity[y*width+x];
            xSum += x*I;
            ySum += y*I;
        }
    }

    let x0 = xSum/total;
    let y0 = ySum/total;

    let radial = [];

    for (let y=0; y<height; y++) {
        for (let x=0; x<width; x++) {
            let I = intensity[y*width+x];
            let r = Math.sqrt((x-x0)**2+(y-y0)**2);
            radial.push({r,I});
        }
    }

    radial.sort((a,b)=>a.r-b.r);

    let cumulative=0;
    let target=0.8*total;

    let r80=0;

    for (let i=0;i<radial.length;i++) {
        cumulative += radial[i].I;
        if (cumulative>=target) {
            r80 = radial[i].r;
            break;
        }
    }

    r80_global = r80;
    currentImageData = {data,width,height,x0,y0};

    let resultText = `r₈₀ = ${r80.toFixed(2)} pixels`;

    let um_per_pixel = parseFloat(document.getElementById('um_per_pixel').value);
    let r_dl = parseFloat(document.getElementById('r_dl').value);

    if (!isNaN(um_per_pixel)) {
        let r_um = r80 * um_per_pixel;
        resultText += ` (${r_um.toFixed(2)} µm)`;

        if (!isNaN(r_dl)) {
            let strehl = (r_dl / r_um)**2;
            resultText += ` | Strehl ≈ ${strehl.toFixed(3)}`;
        }
    }

    document.getElementById('result').innerText = resultText;
}

// PLOT CIRCLE
function plotCircle() {
    if (!currentImageData || !r80_global) return;

    let {width,height,x0,y0} = currentImageData;

    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');

    ctx.beginPath();
    ctx.arc(x0, y0, r80_global, 0, 2*Math.PI);
    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;
    ctx.stroke();
}
</script>

</body>
</html>
